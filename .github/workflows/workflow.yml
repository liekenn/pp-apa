name: AI Prompt Analysis Automation

on:
  schedule:
    - cron: '0 0 * * *'        # Otomatis setiap hari pukul 00:00 UTC
  workflow_dispatch:             # Trigger manual dengan input kustom
    inputs:
      user_prompt:
        description: 'Masukkan topik atau pertanyaan yang ingin dianalisis oleh AI'
        required: true
        type: string

jobs:
  analyze-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
           pip install google-generativeai requests groq

      - name: Run Main Analysis Script
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          HUMANIZE_API_KEY: ${{ secrets.HUMANIZE_API_KEY }}
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          # Jika trigger dari schedule (cron), user_prompt akan berupa string kosong.
          # main.py akan menggantinya dengan prompt default otomatis.
          USER_PROMPT:      ${{ inputs.user_prompt }}
        run: python main.py

      - name: Commit and Push Result File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add hasil_analisis_*.md
          git diff --staged --quiet || git commit -m "chore: add AI analysis report $(date +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
