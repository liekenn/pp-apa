name: AI Repo Analysis Automation

on:
  schedule:
    - cron: '0 0 * * *'   # Setiap hari pukul 00:00 UTC
  workflow_dispatch:        # Bisa di-trigger manual dari GitHub UI

jobs:
  analyze-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Diperlukan agar bisa commit & push ke repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai google-generativeai anthropic requests

      - name: Run Main Analysis Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HUMANIZE_API_KEY: ${{ secrets.HUMANIZE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py

      - name: Commit and Push Result File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add hasil_analisis_*.md
          # Hanya commit jika ada perubahan
          git diff --staged --quiet || git commit -m "chore: add daily AI analysis report $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
